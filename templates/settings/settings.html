<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - Maia</title>
    <link rel="stylesheet" href="/static/css/settings.css">
</head>
<body>
    <div class="settings-container">
        <header>
            <h1>⚙️ Paramètres</h1>
            <p>Configurez votre expérience utilisateur et les réglages du système.</p>
        </header>

        <section class="settings-section">
            <h2>🎙️ Sélection de la Voix (TTS)</h2>
            <div class="setting-item">
                <label for="tts-engine">Moteur TTS :</label>
                <select id="tts-engine">
                    <option value="">Chargement des moteurs...</option>
                    <!-- Sera peuplé dynamiquement -->
                </select>
            </div>
            <div class="setting-item">
                <label for="tts-voice">Voix disponible :</label>
                <select id="tts-voice">
                    <option value="">Chargement des voix...</option>
                    <!-- Sera peuplé dynamiquement -->
                </select>
            </div>
            <div class="setting-item">
                <label for="tts-speed">Vitesse de lecture :</label>
                <input type="range" id="tts-speed" min="0.5" max="2.0" step="0.1" value="1.0">
                <span id="speed-value">1.0x</span>
            </div>
            <div class="setting-item">
                <label for="tts-volume">Volume global :</label>
                <input type="range" id="tts-volume" min="0" max="100" step="1" value="80">
                <span id="volume-value">80%</span>
            </div>
            <div class="setting-item checkbox">
                <input type="checkbox" id="tts-auto-read">
                <label for="tts-auto-read">Lecture automatique</label>
            </div>
        </section>

        <section class="settings-section">
            <h2>🤖 Profil Hermès</h2>
            <div class="setting-item">
                <label for="hermes-profile">Sélection du Profil :</label>
                <select id="hermes-profile">
                    <option value="default">Default</option>
                    <option value="work">Work</option>
                    <option value="creative">Creative</option>
                </select>
                <p class="info-text">Chaque profil est lié à un port spécifique de la gateway.</p>
            </div>
        </section>

        <footer>
            <button class="btn-save" id="save-settings">Sauvegarder les modifications</button>
        </footer>
    </div>
</body>
</html>
