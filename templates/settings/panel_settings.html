<div class="settings-header">
    <h2>⚙️ Configuration du modèle</h2>
    <p>Configurez votre expérience utilisateur et les réglages du système.</p>
</div>

<div class="settings-content">
    <section class="settings-section">
        <h3>🎙️ Sélection de la Voix (TTS)</h3>
        <div class="setting-item">
            <label for="tts-engine">Moteur TTS :</label>
            <select id="tts-engine">
                <option value="">Chargement des moteurs...</option>
                <!-- will be filled dinamically -->
            </select>
        </div>
        <div class="setting-item">
            <label for="tts-voice">Voix disponible :</label>
            <select id="tts-voice">
                <option value="">Chargement des voix...</option>
                <!-- will be filled dinamically -->
            </select>
        </div>
        <div class="setting-item">
            <label for="tts-speed">Vitesse de lecture :</label>
            <input type="range" id="tts-speed" min="0.5" max="1.5" step="0.1" value="1.0">
            <span id="tts-speed-value">1.0x</span>
        </div>
        <div class="setting-item">
            <label for="tts-volume">Volume global :</label>
            <input type="range" id="tts-volume" min="0" max="100" step="1" value="100">
            <span id="tts-volume-value">80%</span>
        </div>
        <div class="setting-item checkbox">
            <label for="tts-auto-read">Lecture automatique</label>
            <input type="checkbox" id="tts-auto-read">
        </div>
    </section>

    <section class="settings-section">
        <h3>🤖 Configuration du modèle</h3>
        <div class="setting-item">
            <label for="llm-endpoint">Endpoint :</label>
            <select id="llm-endpoint">
                <option value="">Chargement des endpoints...</option>
                <!-- will be filled dinamically -->
            </select>
        </div>
        <div class="setting-item" id="hermes-profile-container">
            <label for="hermes-profile">Sélection du Profil :</label>
            <select id="hermes-profile">
                <option value="">Chargement des profils...</option>
                <!-- will be filled dinamically -->
            </select>
        </div>
    </section>
</div>

<div class="settings-footer">
    <button class="btn-save" id="save-settings" hx-on:click="saveSettings()">Sauvegarder les modifications</button>
</div>
