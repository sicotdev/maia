{% for session in result.data %}
    {% include "session/session.html" %}
{% endfor %}

{% if result.has_more %}
    <div class="load-more"
    hx-get="/sessions?offset={{ result.offset + result.limit }}"
    hx-trigger="intersect once"
    hx-swap="outerHTML">
        Chargement...
    </div>
{% endif %}

{% if not result.data %}
    <li class="no-sessions">Aucune session trouvée.</li>
{% endif %}
